# =============================================================================
# config.yaml — Local Voice Agent configuration
# =============================================================================

# ── Audio input ───────────────────────────────────────────────────────────────
audio:
  device: "pulse"      # sounddevice device name or index (null = system default)
  gain: 1.5            # pre-amplification factor (increase if mic is too quiet)

# ── Speech recognition ────────────────────────────────────────────────────────
stt:
  # Whisper language code. Examples: "de", "en", "fr", "es", "it", "ja", "zh"
  # Set to null for automatic language detection (slower, less accurate).
  language: "de"

# ── Language model ────────────────────────────────────────────────────────────
llm:
  base_url: "http://localhost:8000/v1"
  max_tokens: 512
  temperature: 0.7
  system_prompt: >
    Du bist ein hilfreicher, prägnanter Sprachassistent.
    Antworte immer auf Deutsch in kurzen, natürlichen Sätzen,
    die für Text-to-Speech geeignet sind.
    Vermeide Markdown, Aufzählungspunkte und Sonderzeichen.

# ── Text-to-speech ────────────────────────────────────────────────────────────
tts:
  voice: "af_heart"    # Kokoro voice name
  speed: 1.0           # 0.5–2.0
  # eSpeak-NG language code passed to Kokoro.
  # Must match the STT language. Examples: "de", "en-us", "fr-fr", "es"
  lang: "de"

# ── VAD ───────────────────────────────────────────────────────────────────────
vad:
  threshold: 0.30      # Silero confidence threshold (0.0–1.0)
  silence_duration: 0.4  # seconds of silence to end an utterance
